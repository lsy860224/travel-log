<style>
:root {
  --ink: #2b2018;
  --ink-soft: #5d4f43;
  --ink-mute: #9a8d7e;
  --paper: #f7efe0;
  --sand: #ede1c8;
  --sand-deep: #e0d2b3;
  --line: #d9c9a8;
  --stamp: #b84a32;
  --stamp-soft: #f3d8cc;
  --sea-deep: #2f5a6b;
  --sea: #4d7d8e;
  --sea-soft: #d6e2e6;
  --radius-sm: 10px;
  --radius-md: 16px;
  --radius-lg: 24px;
  --cal-max: 1100px;
  --safe-b: env(safe-area-inset-bottom, 0px);
  --serif: "Iowan Old Style","Palatino","Apple Garamond",Georgia,"Nanum Myeongjo",serif;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; }
body {
  font-family: "Pretendard Variable", Pretendard, -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
  color: var(--ink);
  background: var(--paper);
  -webkit-font-smoothing: antialiased;
}

/* ───── Views ───── */
.view {
  position: fixed; inset: 0;
  display: flex; flex-direction: column;
  background: var(--paper);
  transform: translateX(100%);
  transition: transform .28s cubic-bezier(.4,0,.2,1);
  will-change: transform;
}
.view.active { transform: translateX(0); }
.view.behind  { transform: translateX(-28%); }

/* ───── Topbar ───── */
.topbar {
  flex-shrink: 0;
  background: rgba(247,239,224,.92);
  backdrop-filter: saturate(180%) blur(12px);
  -webkit-backdrop-filter: saturate(180%) blur(12px);
  border-bottom: 1px solid var(--line);
  z-index: 1;
}
.topbar-inner {
  max-width: var(--cal-max); margin: 0 auto;
  padding: 12px 12px;
  display: flex; align-items: center; gap: 4px;
}
.topbar-title {
  flex: 1; text-align: center;
  font-size: 16px; font-weight: 700; color: var(--ink);
}
.brand { flex-shrink: 0; display: flex; align-items: center; text-decoration: none; }
.brand img { height: 24px; }
.icon-btn {
  width: 44px; height: 44px;
  display: flex; align-items: center; justify-content: center;
  background: none; border: none; cursor: pointer;
  border-radius: 50%; color: var(--ink);
  -webkit-tap-highlight-color: transparent;
  transition: background .12s; flex-shrink: 0;
}
.icon-btn:active { background: var(--sand); }
.icon-btn svg { width: 20px; height: 20px; pointer-events: none; }

/* ───── Calendar ───── */
.cal-scroll {
  flex: 1; overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  overscroll-behavior: contain;
  display: flex; flex-direction: column;
}
.cal-wrap {
  width: 100%; max-width: var(--cal-max); margin: 0 auto;
  padding: 8px 12px calc(80px + var(--safe-b));
  flex: 1; min-height: 0;
  display: flex; flex-direction: column;
}
.cal-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 8px 4px 12px;
}
.cal-month-text {
  font-family: var(--serif);
  font-size: 22px; font-weight: 400; color: var(--ink);
  letter-spacing: -0.01em;
}
.cal-month-text small {
  font-family: "Pretendard Variable", sans-serif;
  font-size: 13px; font-weight: 600; color: var(--ink-mute); margin-right: 4px;
}
.cal-weekdays {
  display: grid; grid-template-columns: repeat(7, 1fr);
  margin-bottom: 4px; flex-shrink: 0;
}
.cal-weekday {
  text-align: center;
  font-size: 11px; font-weight: 700; letter-spacing: 0.06em;
  color: var(--ink-mute); padding: 4px 0;
}
.cal-weekday.sun { color: #b84a32; }
.cal-weekday.sat { color: var(--sea); }

.cal-grid {
  flex: 1; min-height: 360px;
  display: grid; grid-template-columns: repeat(7, 1fr);
  grid-auto-rows: 1fr;                       /* 행이 남은 높이를 균등 분할 → 페이지를 채움 */
  border-top: 1px solid var(--line);
  border-left: 1px solid var(--line);
  border-radius: var(--radius-md);
  overflow: hidden;                          /* 둥근 외곽으로 셀 클리핑 */
}
.cal-cell {
  position: relative;
  min-height: 52px;
  display: flex; flex-direction: column; align-items: center;
  padding-top: 6px;
  border-right: 1px solid var(--line);       /* 날짜별 칸 구분선 */
  border-bottom: 1px solid var(--line);
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  transition: background .12s;
}
.cal-cell.empty { pointer-events: none; }
.cal-cell:not(.empty):active { background: var(--sand) !important; }

.cal-num {
  width: 34px; height: 34px;
  display: flex; align-items: center; justify-content: center;
  font-size: 15px; font-weight: 500; border-radius: 50%;
  color: var(--ink); line-height: 1;
}
.cal-cell.sun .cal-num  { color: #b84a32; }
.cal-cell.sat .cal-num  { color: var(--sea); }
.cal-cell.today .cal-num {
  background: var(--stamp); color: white; font-weight: 700;
}
.cal-cell.today.sun .cal-num,
.cal-cell.today.sat .cal-num { color: white; }

/* 일정 박스 — 음영 없이 카테고리 색 + 제목이 들어간 얇은 박스 */
.cal-evs { width: 100%; display: flex; flex-direction: column; gap: 2px; margin-top: 3px; }
.cal-ev {
  height: 17px; display: flex; align-items: center; padding: 0 5px;
  font-size: 11px; font-weight: 600; line-height: 1; color: var(--ink);
  border-left: 3px solid transparent; overflow: hidden;
}
.cal-ev.cap-l { border-left-color: var(--c); border-top-left-radius: 4px; border-bottom-left-radius: 4px; }
.cal-ev.cap-r { border-top-right-radius: 4px; border-bottom-right-radius: 4px; }
.cal-ev-t { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.cal-more { font-size: 10px; font-weight: 700; color: var(--ink-mute); line-height: 1; padding: 1px 4px; }

/* FAB */
.fab {
  position: fixed;
  bottom: calc(24px + var(--safe-b)); right: 24px;
  width: 56px; height: 56px; border-radius: 50%;
  background: var(--stamp); color: white; border: none;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  box-shadow: 0 4px 16px rgba(184,74,50,.4);
  z-index: 20; -webkit-tap-highlight-color: transparent;
  transition: transform .15s;
}
.fab:active { transform: scale(.93); }
.fab svg { width: 26px; height: 26px; }

/* ───── Overlay ───── */
.overlay {
  position: fixed; inset: 0;
  background: rgba(43,32,24,.42);
  z-index: 30; opacity: 0; pointer-events: none;
  transition: opacity .25s;
}
.overlay.on { opacity: 1; pointer-events: auto; }

/* ───── Sheet ───── */
.sheet {
  position: fixed; bottom: 0; left: 0; right: 0;
  max-width: 480px; margin: 0 auto;
  background: var(--paper);
  border-radius: var(--radius-lg) var(--radius-lg) 0 0;
  z-index: 40; max-height: 92vh;
  display: flex; flex-direction: column;
  transform: translateY(100%);
  transition: transform .3s cubic-bezier(.4,0,.2,1);
  padding-bottom: var(--safe-b);
}
.sheet.open { transform: translateY(0); }

.sheet-handle {
  width: 40px; height: 4px;
  background: var(--line); border-radius: 2px;
  margin: 12px auto 0; flex-shrink: 0;
}
.sheet-head {
  flex-shrink: 0;
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 18px 12px;
  border-bottom: 1px solid var(--line);
}
.sheet-title { font-size: 16px; font-weight: 700; color: var(--ink); }
.sheet-head-right { display: flex; align-items: center; gap: 4px; }

.sheet-body {
  flex: 1; overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  padding: 18px 18px 4px;
}
.sheet-foot {
  flex-shrink: 0; padding: 10px 18px;
  border-top: 1px solid var(--line);
  display: flex; gap: 8px;
}

/* ───── Forms ───── */
.fg { margin-bottom: 18px; }
.fl {
  display: block; font-size: 11px; font-weight: 700;
  letter-spacing: .08em; text-transform: uppercase;
  color: var(--ink-mute); margin-bottom: 6px;
}
.fi, .fta {
  width: 100%; padding: 11px 13px;
  font-size: 15px; font-family: inherit; color: var(--ink);
  background: white; border: 1.5px solid var(--line);
  border-radius: var(--radius-sm); outline: none;
  -webkit-appearance: none; transition: border-color .15s;
}
.fi:focus, .fta:focus { border-color: var(--stamp); }
.fta { resize: none; min-height: 110px; line-height: 1.65; }

.type-toggle {
  display: flex; background: var(--sand);
  border-radius: var(--radius-sm); padding: 3px; gap: 0; margin-bottom: 14px;
}
.type-toggle button {
  flex: 1; padding: 8px; font-size: 13px; font-weight: 600;
  font-family: inherit; color: var(--ink-soft);
  background: none; border: none; border-radius: 8px;
  cursor: pointer; -webkit-tap-highlight-color: transparent;
  transition: all .15s;
}
.type-toggle button.on {
  background: white; color: var(--stamp);
  box-shadow: 0 1px 3px rgba(43,32,24,.1);
}

.date-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.date-row.single { grid-template-columns: 1fr; }

/* ───── Buttons ───── */
.btn {
  flex: 1; padding: 13px 8px;
  font-size: 14px; font-weight: 700; font-family: inherit;
  border: none; border-radius: var(--radius-sm);
  cursor: pointer; -webkit-tap-highlight-color: transparent;
  transition: opacity .15s;
}
.btn:active { opacity: .78; }
.btn-p { background: var(--stamp); color: white; }
.btn-s { background: var(--sand); color: var(--ink-soft); }
.btn-t { background: var(--sea-soft); color: var(--sea-deep); }
.btn-d { background: #fee2e2; color: #dc2626; flex: 0 0 auto; padding: 13px 16px; }

/* ───── List items (destinations, meals, accommodation) ───── */
.list-items { display: flex; flex-direction: column; gap: 6px; }
.list-item {
  display: flex; align-items: center; gap: 10px;
  background: white; border: 1px solid var(--line);
  border-radius: var(--radius-sm); padding: 11px 13px;
}
.list-item-text { flex: 1; font-size: 15px; color: var(--ink); line-height: 1.4; }
.list-item-del {
  flex-shrink: 0; width: 28px; height: 28px;
  border: none; background: none; color: var(--ink-mute);
  font-size: 17px; cursor: pointer; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  -webkit-tap-highlight-color: transparent; transition: all .12s;
}
.list-item-del:active { color: var(--stamp); background: var(--stamp-soft); }

.add-row { display: flex; gap: 7px; margin-top: 7px; }
.add-input {
  flex: 1; padding: 10px 12px;
  font-size: 14px; font-family: inherit; color: var(--ink);
  background: white; border: 1.5px solid var(--line);
  border-radius: var(--radius-sm); outline: none;
  -webkit-appearance: none; transition: border-color .15s;
}
.add-input:focus { border-color: var(--stamp); }
.add-btn {
  width: 40px; height: 40px; flex-shrink: 0;
  background: var(--stamp); color: white; border: none;
  border-radius: var(--radius-sm); font-size: 22px;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  -webkit-tap-highlight-color: transparent; transition: opacity .12s;
}
.add-btn:disabled { opacity: .35; cursor: default; }

/* ───── Checklist ───── */
.check-items { display: flex; flex-direction: column; }
.check-item {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 4px; border-radius: 8px;
  -webkit-tap-highlight-color: transparent; transition: background .12s;
}
.check-item:active { background: var(--sand); }
.check-item input[type="checkbox"] {
  appearance: none; -webkit-appearance: none;
  width: 20px; height: 20px; flex-shrink: 0;
  border: 1.5px solid var(--stamp); border-radius: 5px;
  background: white; cursor: pointer; position: relative;
  transition: all .15s; margin: 0;
}
.check-item input:checked { background: var(--stamp); border-color: var(--stamp); }
.check-item input:checked::after {
  content: ""; position: absolute;
  left: 5px; top: 1px; width: 5px; height: 10px;
  border: solid white; border-width: 0 2px 2px 0;
  transform: rotate(45deg);
}
.check-item-label { flex: 1; font-size: 15px; color: var(--ink); cursor: pointer; }
.check-item input:checked + .check-item-label { color: var(--ink-mute); text-decoration: line-through; }
.check-item-del {
  flex-shrink: 0; width: 28px; height: 28px;
  border: none; background: none; color: var(--ink-mute); font-size: 17px;
  cursor: pointer; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  -webkit-tap-highlight-color: transparent; transition: all .12s;
}
.check-item-del:active { color: var(--stamp); background: var(--stamp-soft); }

/* ───── View mode display ───── */
.view-date-badge {
  display: inline-flex; align-items: center; gap: 6px;
  font-size: 13px; font-weight: 700;
  padding: 6px 14px; border-radius: 999px; margin-bottom: 16px;
}
.view-date-badge.single { background: var(--stamp-soft); color: var(--stamp); }
.view-date-badge.travel { background: var(--sea-soft); color: var(--sea-deep); }

.view-content {
  font-size: 15px; color: var(--ink); line-height: 1.75;
  white-space: pre-wrap; background: white;
  border: 1px solid var(--line); border-radius: var(--radius-md);
  padding: 16px;
}
.view-section { margin-bottom: 20px; }
.view-section-title {
  font-size: 11px; font-weight: 700;
  letter-spacing: .1em; text-transform: uppercase;
  color: var(--stamp); margin-bottom: 8px;
  display: flex; align-items: center; gap: 8px;
}
.view-section-title::after { content: ""; flex: 1; height: 1px; background: var(--line); }
.view-list { display: flex; flex-direction: column; gap: 5px; }
.view-list-item {
  font-size: 14px; color: var(--ink); padding: 10px 14px;
  background: white; border: 1px solid var(--line);
  border-radius: var(--radius-sm);
}
.view-empty { font-size: 13px; color: var(--ink-mute); font-style: italic; padding: 4px 2px; }

/* ───── Detail page ───── */
.detail-scroll {
  flex: 1; overflow-y: auto;
  -webkit-overflow-scrolling: touch;
}
.detail-wrap {
  max-width: 480px; margin: 0 auto;
  padding: 24px 20px calc(60px + var(--safe-b));
}
.detail-hero {
  padding-bottom: 20px; margin-bottom: 24px;
  border-bottom: 2px solid var(--stamp);
}
.detail-hero-eyebrow {
  font-size: 11px; font-weight: 700; letter-spacing: .12em;
  text-transform: uppercase; color: var(--stamp); margin-bottom: 8px;
  display: flex; align-items: center; gap: 8px;
}
.detail-hero-eyebrow::before { content: ""; width: 20px; height: 1px; background: currentColor; }
.detail-hero h2 {
  font-family: var(--serif); font-size: clamp(28px,7vw,42px);
  font-weight: 400; line-height: 1.1; letter-spacing: -.02em; color: var(--ink);
  margin-bottom: 12px;
}
.detail-hero-meta {
  font-size: 13px; color: var(--ink-soft);
  display: flex; flex-wrap: wrap; gap: 6px 16px;
}
.detail-section { margin-bottom: 28px; }
.detail-section-label {
  font-size: 11px; font-weight: 700; letter-spacing: .12em;
  text-transform: uppercase; color: var(--sea-deep); margin-bottom: 12px;
  display: flex; align-items: center; gap: 8px;
}
.detail-section-label::after { content: ""; flex: 1; height: 1px; background: var(--line); }
.detail-items { display: flex; flex-direction: column; gap: 6px; }
.detail-item {
  font-size: 15px; color: var(--ink); padding: 12px 16px;
  background: white; border: 1px solid var(--line); border-radius: var(--radius-sm);
  line-height: 1.5;
}
.detail-item::before { content: "·"; color: var(--sea); font-weight: 700; margin-right: 8px; }

.detail-check-item {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 16px; background: white;
  border: 1px solid var(--line); border-radius: var(--radius-sm);
  margin-bottom: 6px;
}
.detail-check-item input[type="checkbox"] {
  appearance: none; -webkit-appearance: none;
  width: 20px; height: 20px; flex-shrink: 0;
  border: 1.5px solid var(--stamp); border-radius: 5px;
  background: white; cursor: pointer; position: relative;
  transition: all .15s; margin: 0;
}
.detail-check-item input:checked { background: var(--stamp); border-color: var(--stamp); }
.detail-check-item input:checked::after {
  content: ""; position: absolute; left: 5px; top: 1px;
  width: 5px; height: 10px; border: solid white;
  border-width: 0 2px 2px 0; transform: rotate(45deg);
}
.detail-check-label { flex: 1; font-size: 15px; color: var(--ink); cursor: pointer; }
.detail-check-item input:checked + .detail-check-label { color: var(--ink-mute); text-decoration: line-through; }

.detail-single-content {
  font-size: 15px; color: var(--ink); line-height: 1.75;
  white-space: pre-wrap; background: white;
  border: 1px solid var(--line); border-radius: var(--radius-md); padding: 18px;
}

/* empty state */
.empty-cal {
  text-align: center; padding: 48px 20px;
  color: var(--ink-mute); font-size: 13px; line-height: 1.7;
}

/* ───── Picker (multi-event day) ───── */
.picker-list { display: flex; flex-direction: column; gap: 8px; }
.picker-item {
  display: flex; align-items: center; gap: 12px;
  width: 100%; text-align: left;
  background: white; border: 1px solid var(--line);
  border-radius: var(--radius-md); padding: 14px;
  cursor: pointer; font-family: inherit;
  -webkit-tap-highlight-color: transparent; transition: background .12s;
}
.picker-item:active { background: var(--sand); }
.picker-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.picker-dot.s { background: var(--stamp); }
.picker-dot.t { background: var(--sea); }
.picker-text { flex: 1; display: flex; flex-direction: column; gap: 3px; min-width: 0; }
.picker-label {
  font-size: 15px; font-weight: 600; color: var(--ink);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.picker-sub { font-size: 12px; color: var(--ink-mute); }
.picker-chev { width: 18px; height: 18px; color: var(--ink-mute); flex-shrink: 0; }

/* ───── Category picker / tag ───── */
.cat-row { display: flex; flex-wrap: wrap; gap: 7px; }
.cat-chip {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 7px 12px 7px 10px; font-size: 13px; font-weight: 600;
  font-family: inherit; color: var(--ink-soft);
  background: white; border: 1.5px solid var(--line);
  border-radius: 999px; cursor: pointer;
  -webkit-tap-highlight-color: transparent; transition: all .12s;
}
.cat-chip .cat-sw { width: 13px; height: 13px; border-radius: 50%; flex-shrink: 0; }
.cat-chip.on { border-color: var(--c); color: var(--ink); box-shadow: inset 0 0 0 1px var(--c); }
.view-head { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; margin-bottom: 16px; }
.view-head .view-date-badge { margin-bottom: 0; }
.cat-tag {
  display: inline-flex; align-items: center; gap: 6px;
  font-size: 12px; font-weight: 700; color: var(--c);
  padding: 5px 11px; border-radius: 999px;
  background: white; border: 1px solid var(--line);
}
.cat-tag::before { content: ''; width: 9px; height: 9px; border-radius: 50%; background: var(--c); }

/* ───── Category manage / editor ───── */
.cat-chip.cat-add { color: var(--ink-mute); border-style: dashed; }
.cat-inline { margin-top: 10px; }
.cat-ed { background: var(--sand); border-radius: var(--radius-sm); padding: 12px; }
.cat-ed .cat-name { margin-bottom: 10px; }
.cat-sw-row { display: flex; flex-wrap: wrap; gap: 9px; align-items: center; margin-bottom: 12px; }
.cat-sw-btn {
  width: 26px; height: 26px; border-radius: 50%; border: none; padding: 0; cursor: pointer;
  -webkit-tap-highlight-color: transparent; box-shadow: 0 0 0 1px rgba(43,32,24,.1);
}
.cat-sw-btn.on { box-shadow: 0 0 0 2px var(--paper), 0 0 0 4px var(--ink); }
.cat-custom {
  width: 26px; height: 26px; border-radius: 50%; overflow: hidden;
  display: inline-flex; cursor: pointer; border: 1px dashed var(--ink-mute);
}
.cat-color { width: 200%; height: 200%; margin: -50%; padding: 0; border: none; background: none; cursor: pointer; }
.cat-ed-foot { display: flex; gap: 8px; }
.cat-manage { display: flex; flex-direction: column; gap: 6px; margin-bottom: 12px; }
.cat-manage-row {
  display: flex; align-items: center; gap: 10px;
  background: white; border: 1px solid var(--line);
  border-radius: var(--radius-sm); padding: 10px 12px;
}
.cat-manage-row .cat-sw { width: 16px; height: 16px; box-shadow: 0 0 0 1px rgba(43,32,24,.1); }
.cat-manage-name { flex: 1; font-size: 15px; color: var(--ink); }
.cat-mini {
  width: 30px; height: 30px; flex-shrink: 0; border: none; background: none;
  cursor: pointer; border-radius: 50%; color: var(--ink-mute); font-size: 16px;
  display: flex; align-items: center; justify-content: center;
  -webkit-tap-highlight-color: transparent; transition: all .12s;
}
.cat-mini:active { background: var(--sand); }
.cat-del:active { color: var(--stamp); background: var(--stamp-soft); }
.cat-add-full {
  width: 100%; padding: 12px; font-size: 14px; font-weight: 700; font-family: inherit;
  color: var(--stamp); background: var(--stamp-soft); border: none;
  border-radius: var(--radius-sm); cursor: pointer; -webkit-tap-highlight-color: transparent;
}
.cat-manage-edit { margin: 2px 0; }
</style>
</head>
<body>

<!-- ══ VIEW: Calendar ══ -->
<div id="v-cal" class="view active">
  <header class="topbar">
    <div class="topbar-inner">
      <a class="brand" href="#" onclick="return false"><img src="assets/logo.svg" alt="travel·log" /></a>
      <button class="icon-btn" id="btn-cats" aria-label="카테고리 관리">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"/><line x1="7" y1="7" x2="7.01" y2="7"/></svg>
      </button>
      <span style="flex:1"></span>
      <button class="icon-btn" id="btn-prev" aria-label="이전 달">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="15 18 9 12 15 6"/></svg>
      </button>
      <span id="cal-month-text" class="cal-month-text"></span>
      <button class="icon-btn" id="btn-next" aria-label="다음 달">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="9 18 15 12 9 6"/></svg>
      </button>
    </div>
  </header>

  <div class="cal-scroll">
    <div class="cal-wrap">
      <div class="cal-weekdays" id="cal-weekdays"></div>
      <div class="cal-grid" id="cal-grid"></div>
    </div>
  </div>

  <button class="fab" id="btn-add" aria-label="일정 추가">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
  </button>
</div>

<!-- ══ VIEW: Detail ══ -->
<div id="v-detail" class="view">
  <header class="topbar">
    <div class="topbar-inner">
      <button class="icon-btn" id="btn-back" aria-label="뒤로">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="15 18 9 12 15 6"/></svg>
      </button>
      <span id="detail-title" class="topbar-title"></span>
      <button class="icon-btn" id="btn-detail-edit" aria-label="편집">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
      </button>
    </div>
  </header>
  <div class="detail-scroll">
    <div id="detail-body" class="detail-wrap"></div>
  </div>
</div>

<!-- ══ Overlay ══ -->
<div id="overlay" class="overlay"></div>

<!-- ══ Sheet ══ -->
<div id="sheet" class="sheet" role="dialog" aria-modal="true">
  <div class="sheet-handle"></div>
  <div class="sheet-head">
    <span id="sheet-title" class="sheet-title"></span>
    <div class="sheet-head-right">
      <button class="icon-btn" id="btn-sheet-edit" style="display:none" aria-label="편집">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
      </button>
      <button class="icon-btn" id="btn-sheet-close" aria-label="닫기">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
  </div>
  <div id="sheet-body" class="sheet-body"></div>
  <div id="sheet-foot" class="sheet-foot"></div>
</div>

<script>
(function () {
  'use strict';

  /* ─── Storage ─── */
  const KEY = 'travel-log:v2';
  function load() { try { return JSON.parse(localStorage.getItem(KEY) || '{}'); } catch { return {}; } }
  function save(d) { try { localStorage.setItem(KEY, JSON.stringify(d)); } catch {} }

  /* ─── Utils ─── */
  function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2,5); }
  function pad(n) { return String(n).padStart(2,'0'); }
  function ymd(y,m,d) { return `${y}-${pad(m+1)}-${pad(d)}`; }
  function parseYmd(s) { const [y,m,d]=s.split('-').map(Number); return new Date(y,m-1,d); }
  const DAYS=['일','월','화','수','목','금','토'];
  const MONTHS=['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
  function fmtDate(s) { const d=parseYmd(s); return `${d.getMonth()+1}월 ${d.getDate()}일 (${DAYS[d.getDay()]})`; }
  function fmtRange(s,e) { return `${fmtDate(s)} — ${fmtDate(e)}`; }
  function today() { const n=new Date(); return ymd(n.getFullYear(),n.getMonth(),n.getDate()); }
  function nightsBetween(s,e) {
    const ms=parseYmd(s), me=parseYmd(e);
    return Math.round((me-ms)/(1000*60*60*24));
  }

  /* ─── Categories (사용자 편집 가능, localStorage 저장) ─── */
  const CKEY = 'travel-log:cats';
  const DEFAULT_CATS = [
    { id:'family', name:'가족',   color:'#b84a32' },
    { id:'trip',   name:'여행',   color:'#4d7d8e' },
    { id:'plan',   name:'약속',   color:'#c0823a' },
    { id:'anniv',  name:'기념일', color:'#a2566b' },
    { id:'health', name:'건강',   color:'#6e8b5a' },
    { id:'etc',    name:'기타',   color:'#7a6e8c' },
  ];
  // 색 빠른 선택 스와치 (직접 색상 선택은 native color input)
  const SWATCHES = ['#b84a32','#c0823a','#a2566b','#7a6e8c','#6e8b5a','#4d7d8e','#2f5a6b','#9c5a3c','#5f7a4e','#8c5a6e','#46708c','#88753f'];
  let CATS = loadCats();
  let CAT_MAP = {};
  rebuildCatMap();
  function loadCats() {
    try { const s = JSON.parse(localStorage.getItem(CKEY)); if(Array.isArray(s) && s.length) return s; } catch {}
    return DEFAULT_CATS.map(c=>({...c}));
  }
  function saveCats() { try { localStorage.setItem(CKEY, JSON.stringify(CATS)); } catch {} }
  function rebuildCatMap() { CAT_MAP = Object.fromEntries(CATS.map(c=>[c.id,c])); }
  function defaultCatId(isRange) {
    const pref = isRange ? 'trip' : 'family';
    return CAT_MAP[pref] ? pref : ((CATS[0] && CATS[0].id) || 'family');
  }
  function freshColor() { return SWATCHES.find(s=>!CATS.some(c=>c.color===s)) || SWATCHES[0]; }
  function catOf(ev) { return (ev && CAT_MAP[ev.category]) || null; }
  // 카테고리 색 — 없으면 타입별 기존 색으로 폴백 (하위호환)
  function catColor(ev) {
    const c = catOf(ev);
    return c ? c.color : (ev && ev.type==='travel' ? '#4d7d8e' : '#b84a32');
  }
  function hexA(hex, a) {
    const n = parseInt(hex.slice(1), 16);
    return `rgba(${(n>>16)&255},${(n>>8)&255},${n&255},${a})`;
  }
  // ── CRUD ──
  function addCat(name, color) { const c={ id:uid(), name:(name||'').trim()||'새 카테고리', color }; CATS.push(c); saveCats(); rebuildCatMap(); return c; }
  function updateCat(id, name, color) { const c=CAT_MAP[id]; if(!c) return; c.name=(name||'').trim()||c.name; c.color=color; saveCats(); rebuildCatMap(); }
  function removeCat(id) { CATS = CATS.filter(c=>c.id!==id); saveCats(); rebuildCatMap(); }

  // ── 선택 칩 (생성·편집 피커) ──
  function catChipsHtml(selId) {
    return CATS.map(c=>`
      <button type="button" class="cat-chip${c.id===selId?' on':''}" data-cat="${c.id}" style="--c:${c.color}">
        <span class="cat-sw" style="background:${c.color}"></span>${esc(c.name)}
      </button>`).join('')
      + `<button type="button" class="cat-chip cat-add" aria-label="카테고리 추가">+ 직접 추가</button>`;
  }
  function catPickerHtml(selId) {
    const sel = selId || defaultCatId(false);
    return `
      <div class="fg">
        <label class="fl">카테고리</label>
        <div class="cat-row" data-auto="${selId?'0':'1'}">${catChipsHtml(sel)}</div>
        <div class="cat-inline" hidden></div>
      </div>`;
  }
  function bindChips(row) {
    const inline = row.parentElement.querySelector('.cat-inline');
    row.querySelectorAll('.cat-chip').forEach(chip=>{
      if(chip.classList.contains('cat-add')) { chip.addEventListener('click', ()=>openInlineAdd(row, inline)); return; }
      chip.addEventListener('click', ()=>{
        row.querySelectorAll('.cat-chip').forEach(c=>c.classList.remove('on'));
        chip.classList.add('on'); row.dataset.auto='0';
      });
    });
  }
  function bindCatRow(root) { const row=root.querySelector('.cat-row'); if(row) bindChips(row); }
  function selectedCat(root) {
    const on = root.querySelector('.cat-chip.on');
    return on ? on.dataset.cat : defaultCatId(false);
  }
  // 피커 안에서 즉석 추가
  function openInlineAdd(row, inline) {
    if(!inline) return;
    const color = freshColor();
    inline.hidden = false;
    inline.innerHTML = catEditorHtml('', color);
    bindCatEditor(inline, color,
      (name, col)=>{ const c=addCat(name,col); inline.hidden=true; inline.innerHTML=''; row.innerHTML=catChipsHtml(c.id); bindChips(row); row.dataset.auto='0'; },
      ()=>{ inline.hidden=true; inline.innerHTML=''; });
    const ni = inline.querySelector('.cat-name'); if(ni) ni.focus();
  }
  function catTag(ev) {
    const c = catOf(ev); if(!c) return '';
    return `<span class="cat-tag" style="--c:${c.color}">${esc(c.name)}</span>`;
  }

  // ── 색·이름 에디터 (인라인 추가 + 관리 시트 공용) ──
  function catEditorHtml(name, color) {
    return `
      <div class="cat-ed">
        <input class="fi cat-name" type="text" maxlength="12" placeholder="카테고리 이름" value="${esc(name)}" />
        <div class="cat-sw-row">
          ${SWATCHES.map(s=>`<button type="button" class="cat-sw-btn${s.toLowerCase()===color.toLowerCase()?' on':''}" data-color="${s}" style="background:${s}" aria-label="${s}"></button>`).join('')}
          <label class="cat-custom" title="직접 색 선택"><input class="cat-color" type="color" value="${color}" /></label>
        </div>
        <div class="cat-ed-foot">
          <button type="button" class="btn btn-s cat-cancel">취소</button>
          <button type="button" class="btn btn-p cat-save">저장</button>
        </div>
      </div>`;
  }
  function bindCatEditor(root, initColor, onSave, onCancel) {
    let color = initColor;
    const swRow = root.querySelector('.cat-sw-row');
    const colorInput = root.querySelector('.cat-color');
    function setColor(c, fromInput) {
      color = c;
      swRow.querySelectorAll('.cat-sw-btn').forEach(b=>b.classList.toggle('on', b.dataset.color.toLowerCase()===c.toLowerCase()));
      if(!fromInput && colorInput) colorInput.value = c;
    }
    swRow.querySelectorAll('.cat-sw-btn').forEach(b=>b.addEventListener('click', ()=>setColor(b.dataset.color, false)));
    if(colorInput) colorInput.addEventListener('input', ()=>setColor(colorInput.value, true));
    root.querySelector('.cat-save').addEventListener('click', ()=>onSave(root.querySelector('.cat-name').value, color));
    root.querySelector('.cat-cancel').addEventListener('click', ()=>onCancel && onCancel());
  }

  // ── 카테고리 관리 시트 (전체 CRUD) ──
  function openCats() {
    sheetMode='cats'; activeId=null;
    sheetTitle.textContent='카테고리 관리';
    btnSheetEdit.style.display='none';
    renderCatsBody(null);
    sheetFoot.innerHTML='';
    const done = btn('완료','btn btn-p'); done.onclick=()=>{ closeSheet(); renderCalendar(); };
    sheetFoot.append(done);
    openSheet();
  }
  function renderCatsBody(editId) {
    let html = `<div class="cat-manage">`;
    CATS.forEach(c=>{
      if(c.id===editId) {
        html += `<div class="cat-manage-edit" data-id="${c.id}">${catEditorHtml(c.name, c.color)}</div>`;
      } else {
        html += `
          <div class="cat-manage-row" data-id="${c.id}">
            <span class="cat-sw" style="background:${c.color}"></span>
            <span class="cat-manage-name">${esc(c.name)}</span>
            <button type="button" class="cat-mini cat-edit" aria-label="편집">✎</button>
            <button type="button" class="cat-mini cat-del" aria-label="삭제">×</button>
          </div>`;
      }
    });
    html += `</div>`;
    if(editId==='__new__') html += `<div class="cat-manage-edit" data-id="__new__">${catEditorHtml('', freshColor())}</div>`;
    else html += `<button type="button" class="cat-add-full" id="cat-add-new">+ 새 카테고리</button>`;
    sheetBody.innerHTML = html;
    // bind
    sheetBody.querySelectorAll('.cat-manage-row').forEach(rowEl=>{
      const id = rowEl.dataset.id;
      rowEl.querySelector('.cat-edit').addEventListener('click', ()=>renderCatsBody(id));
      rowEl.querySelector('.cat-del').addEventListener('click', ()=>{
        if(CATS.length<=1) { alert('카테고리는 최소 1개 필요합니다.'); return; }
        if(!confirm('이 카테고리를 삭제할까요?\n(해당 일정은 기본색으로 표시됩니다)')) return;
        removeCat(id); renderCatsBody(null);
      });
    });
    const addNew = sheetBody.querySelector('#cat-add-new');
    if(addNew) addNew.addEventListener('click', ()=>renderCatsBody('__new__'));
    const edEl = sheetBody.querySelector('.cat-manage-edit');
    if(edEl) {
      const id = edEl.dataset.id;
      const initColor = id==='__new__' ? freshColor() : CAT_MAP[id].color;
      bindCatEditor(edEl, initColor,
        (name, color)=>{ if(id==='__new__') addCat(name,color); else updateCat(id,name,color); renderCatsBody(null); },
        ()=>renderCatsBody(null));
    }
  }

  /* ─── State ─── */
  let DB = load();
  let cy = new Date().getFullYear();
  let cm = new Date().getMonth();
  let sheetMode = ''; // 'create'|'view'|'edit'
  let activeId = null;
  let prefillDate = null;

  /* ─── DOM refs ─── */
  const vCal     = document.getElementById('v-cal');
  const vDetail  = document.getElementById('v-detail');
  const overlay  = document.getElementById('overlay');
  const sheet    = document.getElementById('sheet');
  const sheetTitle    = document.getElementById('sheet-title');
  const sheetBody     = document.getElementById('sheet-body');
  const sheetFoot     = document.getElementById('sheet-foot');
  const btnSheetEdit  = document.getElementById('btn-sheet-edit');
  const btnSheetClose = document.getElementById('btn-sheet-close');
  const detailBody    = document.getElementById('detail-body');
  const detailTitle   = document.getElementById('detail-title');

  /* ─── Calendar ─── */
  function renderCalendar() {
    const label = document.getElementById('cal-month-text');
    label.innerHTML = `<small>${cy}년</small>${MONTHS[cm]}`;

    // weekday headers
    const wdEl = document.getElementById('cal-weekdays');
    wdEl.innerHTML = DAYS.map((d,i) =>
      `<div class="cal-weekday${i===0?' sun':i===6?' sat':''}">${d}</div>`
    ).join('');

    const grid = document.getElementById('cal-grid');
    grid.innerHTML = '';
    const eventLanes = assignLanes();
    const LANES_MAX = 3;            // 셀에 일정 박스 최대 3개, 그 이상은 +N

    const todayStr = today();
    const firstDow = new Date(cy,cm,1).getDay();
    const daysInMonth = new Date(cy,cm+1,0).getDate();
    const cells = [];
    for(let i=0;i<firstDow;i++) cells.push(null);
    for(let d=1;d<=daysInMonth;d++) cells.push(d);
    while(cells.length%7!==0) cells.push(null);

    cells.forEach((day,idx) => {
      const cell = document.createElement('div');
      if(!day) { cell.className='cal-cell empty'; grid.appendChild(cell); return; }

      const ds = ymd(cy,cm,day);
      const dow = (firstDow+day-1)%7;
      const isWkStart = idx%7===0, isWkEnd = idx%7===6;

      // Gather events for this date
      const evs = getEventsFor(ds);

      // Build class list
      const cls = ['cal-cell'];
      if(ds===todayStr) cls.push('today');
      if(dow===0) cls.push('sun');
      if(dow===6) cls.push('sat');
      if(isWkStart) cls.push('wk-start');
      if(isWkEnd)   cls.push('wk-end');

      cell.className = cls.join(' ');
      cell.dataset.date = ds;
      cell.innerHTML = `<div class="cal-num">${day}</div>`;

      // 일정 = 카테고리 색 + 제목이 들어간 얇은 박스. 음영 없음, 단일·여행 모두 레인에 쌓음.
      const laned = evs.map(e=>({ ev:e, lane:eventLanes[e.id] }))
                       .filter(x=>x.lane!=null && x.lane<LANES_MAX);
      const overflowN = evs.filter(e=>eventLanes[e.id]>=LANES_MAX).length;
      if(laned.length || overflowN) {
        const byLane = {}; laned.forEach(x=>byLane[x.lane]=x);
        const maxL = laned.length ? Math.max(...laned.map(x=>x.lane)) : -1;
        let rows = '';
        for(let L=0; L<=maxL; L++) {
          const x = byLane[L];
          if(!x) { rows += `<div class="cal-ev gap"></div>`; continue; }      // 빈 레인 = 정렬용 spacer
          const e = x.ev;
          const capL = ds===e.startDate || isWkStart;   // 시작일/주 시작 → 둥근 캡 + 라벨
          const capR = ds===e.endDate   || isWkEnd;
          const col  = catColor(e);
          const label = capL ? `<span class="cal-ev-t">${esc(evLabel(e))}</span>` : '';
          rows += `<div class="cal-ev${capL?' cap-l':''}${capR?' cap-r':''}" style="--c:${col};background:${hexA(col,.18)}">${label}</div>`;
        }
        if(overflowN) rows += `<div class="cal-more">+${overflowN}개</div>`;
        const wrap = document.createElement('div');
        wrap.className = 'cal-evs';
        wrap.innerHTML = rows;
        cell.appendChild(wrap);
      }

      cell.addEventListener('click', ()=>onDateClick(ds));
      grid.appendChild(cell);
    });
  }

  function getEventsFor(ds) {
    return Object.values(DB).filter(e=> ds>=e.startDate && ds<=e.endDate);
  }

  // 모든 일정(단일+여행)에 레인 번호 배정 (greedy interval partitioning).
  // 같은 일정은 전 기간 동일 레인 → 주(week) 경계를 넘어도 박스가 한 줄로 이어짐.
  function assignLanes() {
    const list = Object.values(DB)
      .slice()
      .sort((a,b)=> a.startDate<b.startDate ? -1
                  : a.startDate>b.startDate ? 1
                  : b.endDate.localeCompare(a.endDate));   // 시작일 오름차순, 동률이면 긴 일정 먼저
    const laneEnds = [];   // laneEnds[i] = i번 레인 마지막 일정의 종료일
    const map = {};
    list.forEach(t=>{
      let lane = 0;
      while(lane<laneEnds.length && laneEnds[lane]>=t.startDate) lane++;  // 종료일이 시작일과 같거나 늦으면 겹침
      map[t.id] = lane;
      laneEnds[lane] = t.endDate;
    });
    return map;
  }

  // 달력 박스에 표시할 라벨 — 여행은 제목, 단일은 내용 첫 줄
  function evLabel(e) {
    if(e.type==='travel') return e.title || '여행';
    const line = (e.content||'').split('\n').map(s=>s.trim()).filter(Boolean)[0];
    return line || '메모';
  }

  function onDateClick(ds) {
    const evs = getEventsFor(ds);
    if(!evs.length) { openCreate(ds); }
    else if(evs.length===1) { openView(evs[0].id); }
    else { openPicker(ds, evs); }
  }

  /* ─── PICKER (같은 날 일정이 여러 개) ─── */
  function openPicker(ds, evs) {
    sheetMode='picker'; activeId=null;
    sheetTitle.textContent=fmtDate(ds);
    btnSheetEdit.style.display='none';
    // 여행을 위로, 단일을 아래로
    const items=evs.slice().sort((a,b)=>(a.type==='travel'?0:1)-(b.type==='travel'?0:1));
    sheetBody.innerHTML=`
      <div class="picker-list">
        ${items.map(e=>{
          const isT=e.type==='travel';
          const label=isT ? (esc(e.title)||'여행 일정')
                          : (esc((e.content||'').split('\n')[0]) || '<em style="color:var(--ink-mute)">내용 없음</em>');
          const sub=isT ? `${fmtRange(e.startDate,e.endDate)} · ${nightsBetween(e.startDate,e.endDate)}박`
                        : '단일 일정';
          return `
            <button class="picker-item" data-id="${e.id}">
              <span class="picker-dot" style="background:${catColor(e)}"></span>
              <span class="picker-text">
                <span class="picker-label">${label}</span>
                <span class="picker-sub">${sub}</span>
              </span>
              <svg class="picker-chev" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="9 18 15 12 9 6"/></svg>
            </button>`;
        }).join('')}
      </div>`;
    sheetBody.querySelectorAll('.picker-item').forEach(b=>{
      b.addEventListener('click',()=>openView(b.dataset.id));
    });
    sheetFoot.innerHTML='';
    const add=btn('+ 이 날 일정 추가','btn btn-s');
    add.onclick=()=>openCreate(ds);
    sheetFoot.append(add);
    openSheet();
  }

  /* ─── Sheet helpers ─── */
  function openSheet() {
    overlay.classList.add('on');
    sheet.classList.add('open');
    document.body.style.overflow='hidden';
  }
  function closeSheet() {
    overlay.classList.remove('on');
    sheet.classList.remove('open');
    document.body.style.overflow='';
    sheetMode=''; activeId=null; prefillDate=null;
  }

  /* ─── CREATE ─── */
  function openCreate(ds) {
    sheetMode='create'; prefillDate=ds||today();
    sheetTitle.textContent='새 일정';
    btnSheetEdit.style.display='none';
    renderCreateBody();
    renderCreateFoot();
    openSheet();
  }

  function renderCreateBody() {
    sheetBody.innerHTML = `
      <div class="fg">
        <div class="type-toggle">
          <button class="on" data-t="single">단일 날짜</button>
          <button data-t="range">기간 날짜</button>
        </div>
      </div>
      ${catPickerHtml(null)}
      <div class="fg" id="fg-dates">
        <label class="fl">날짜</label>
        <div class="date-row single">
          <input class="fi" type="date" id="inp-start" value="${prefillDate}" />
        </div>
      </div>
      <div class="fg" id="fg-content">
        <label class="fl">내용</label>
        <textarea class="fta" id="inp-content" placeholder="일정 내용을 입력하세요…" rows="4"></textarea>
      </div>
    `;
    sheetBody.querySelectorAll('.type-toggle button').forEach(btn=>{
      btn.addEventListener('click', ()=>{
        sheetBody.querySelectorAll('.type-toggle button').forEach(b=>b.classList.remove('on'));
        btn.classList.add('on');
        const isRange = btn.dataset.t==='range';
        const datesDiv = document.getElementById('fg-dates');
        const s = document.getElementById('inp-start').value || prefillDate;
        datesDiv.querySelector('.date-row').className = isRange ? 'date-row' : 'date-row single';
        if(isRange) {
          datesDiv.querySelector('.date-row').innerHTML = `
            <input class="fi" type="date" id="inp-start" value="${s}" />
            <input class="fi" type="date" id="inp-end" value="${s}" />
          `;
        } else {
          datesDiv.querySelector('.date-row').innerHTML = `
            <input class="fi" type="date" id="inp-start" value="${s}" />
          `;
        }
        // 카테고리를 직접 안 골랐으면 타입에 맞춰 자동 기본값 (단일→가족, 기간→여행)
        const catRow = sheetBody.querySelector('.cat-row');
        if(catRow && catRow.dataset.auto==='1') {
          const want = defaultCatId(isRange);
          catRow.querySelectorAll('.cat-chip').forEach(c=>c.classList.toggle('on', c.dataset.cat===want));
        }
      });
    });
    bindCatRow(sheetBody);
  }

  function renderCreateFoot() {
    sheetFoot.innerHTML='';
    const cancel = btn('취소','btn btn-s'); cancel.onclick=closeSheet;
    const save   = btn('저장','btn btn-p'); save.onclick=saveCreate;
    sheetFoot.append(cancel,save);
  }

  function saveCreate() {
    const startEl = document.getElementById('inp-start');
    const endEl   = document.getElementById('inp-end');
    const contentEl = document.getElementById('inp-content');
    const start = startEl?.value;
    const end   = endEl?.value || start;
    const content = contentEl?.value.trim()||'';

    if(!start) { startEl.focus(); return; }
    if(end && end<start) { alert('종료일이 시작일보다 앞입니다.'); return; }

    const isTravel = end && end!==start;
    const ev = {
      id: uid(),
      type: isTravel?'travel':'single',
      category: selectedCat(sheetBody),
      startDate: start, endDate: end||start,
      ...(isTravel
        ? { title:'', accommodation:[], destinations:[], meals:[], packing:[] }
        : { content })
    };
    DB[ev.id]=ev; save(DB);
    renderCalendar();
    closeSheet();
    if(isTravel) setTimeout(()=>openView(ev.id), 100);
  }

  /* ─── VIEW ─── */
  function openView(id) {
    sheetMode='view'; activeId=id;
    const ev = DB[id]; if(!ev) return;
    sheetTitle.textContent = ev.type==='travel'
      ? (ev.title||'여행 일정')
      : fmtDate(ev.startDate);
    btnSheetEdit.style.display='flex';
    renderViewBody(ev);
    renderViewFoot(ev);
    openSheet();
  }

  function renderViewBody(ev) {
    if(ev.type==='single') {
      sheetBody.innerHTML=`
        <div class="view-head">
          <div class="view-date-badge single">${fmtDate(ev.startDate)}</div>
          ${catTag(ev)}
        </div>
        <div class="view-content">${esc(ev.content)||'<em style="color:var(--ink-mute)">내용 없음</em>'}</div>
      `;
    } else {
      const nights = nightsBetween(ev.startDate,ev.endDate);
      sheetBody.innerHTML=`
        <div class="view-head">
          <div class="view-date-badge travel">${fmtRange(ev.startDate,ev.endDate)} · ${nights}박 ${nights+1}일</div>
          ${catTag(ev)}
        </div>
        ${viewSection('숙소',ev.accommodation)}
        ${viewSection('여행지',ev.destinations)}
        ${viewSection('식사',ev.meals)}
        ${viewCheckSection('준비물',ev.packing,ev.id)}
      `;
      // bind packing checkboxes
      sheetBody.querySelectorAll('.packing-cb').forEach(cb=>{
        cb.addEventListener('change',()=>{
          const item = DB[ev.id].packing.find(p=>p.id===cb.dataset.pid);
          if(item) { item.checked=cb.checked; save(DB); }
        });
      });
    }
  }

  function viewSection(label, items) {
    if(!items||!items.length) return `
      <div class="view-section">
        <div class="view-section-title">${label}</div>
        <div class="view-empty">미입력</div>
      </div>`;
    return `
      <div class="view-section">
        <div class="view-section-title">${label}</div>
        <div class="view-list">${items.map(t=>`<div class="view-list-item">${esc(t)}</div>`).join('')}</div>
      </div>`;
  }

  function viewCheckSection(label, items, evId) {
    if(!items||!items.length) return `
      <div class="view-section">
        <div class="view-section-title">${label}</div>
        <div class="view-empty">미입력</div>
      </div>`;
    return `
      <div class="view-section">
        <div class="view-section-title">${label}</div>
        ${items.map(p=>`
          <div class="check-item">
            <input type="checkbox" class="packing-cb" data-pid="${p.id}" ${p.checked?'checked':''}>
            <label class="check-item-label">${esc(p.label)}</label>
          </div>`).join('')}
      </div>`;
  }

  function renderViewFoot(ev) {
    sheetFoot.innerHTML='';
    const del = btn('삭제','btn btn-d'); del.onclick=()=>deleteEvent(ev.id);
    if(ev.type==='travel') {
      const detail = btn('상세 →','btn btn-t'); detail.onclick=()=>{ closeSheet(); openDetail(ev.id); };
      sheetFoot.append(del, detail);
    } else {
      sheetFoot.append(del);
    }
  }

  /* ─── EDIT ─── */
  function openEdit(id) {
    sheetMode='edit'; activeId=id;
    const ev = DB[id]; if(!ev) return;
    sheetTitle.textContent='일정 편집';
    btnSheetEdit.style.display='none';
    renderEditBody(ev);
    renderEditFoot(ev);
    openSheet();
  }

  function renderEditBody(ev) {
    if(ev.type==='single') {
      sheetBody.innerHTML=`
        <div class="fg">
          <label class="fl">날짜</label>
          <div class="date-row single">
            <input class="fi" type="date" id="ed-start" value="${ev.startDate}" />
          </div>
        </div>
        ${catPickerHtml(ev.category||'family')}
        <div class="fg">
          <label class="fl">내용</label>
          <textarea class="fta" id="ed-content">${esc(ev.content)}</textarea>
        </div>
      `;
      bindCatRow(sheetBody);
    } else {
      sheetBody.innerHTML=`
        <div class="fg">
          <label class="fl">제목</label>
          <input class="fi" type="text" id="ed-title" placeholder="여행 이름 (선택)" value="${esc(ev.title||'')}" />
        </div>
        ${catPickerHtml(ev.category||'trip')}
        <div class="fg">
          <label class="fl">기간</label>
          <div class="date-row">
            <input class="fi" type="date" id="ed-start" value="${ev.startDate}" />
            <input class="fi" type="date" id="ed-end"   value="${ev.endDate}"   />
          </div>
        </div>
        ${editListSection('숙소','accommodation', ev.accommodation)}
        ${editListSection('여행지','destinations', ev.destinations)}
        ${editListSection('식사','meals', ev.meals)}
        ${editCheckSection(ev.packing)}
      `;
      bindEditListSections(ev);
      bindEditCheckSection(ev);
      bindCatRow(sheetBody);
    }
  }

  function editListSection(label, key, items) {
    const listHtml = (items||[]).map(t=>`
      <div class="list-item" data-key="${key}">
        <span class="list-item-text">${esc(t)}</span>
        <button class="list-item-del" data-key="${key}" data-val="${esc(t)}" aria-label="삭제">×</button>
      </div>`).join('');
    return `
      <div class="fg" id="fg-${key}">
        <label class="fl">${label}</label>
        <div class="list-items" id="list-${key}">${listHtml}</div>
        <div class="add-row">
          <input class="add-input" id="add-${key}" type="text" placeholder="${label} 추가…" />
          <button class="add-btn" id="addbtn-${key}" disabled>+</button>
        </div>
      </div>`;
  }

  function editCheckSection(items) {
    const html = (items||[]).map(p=>`
      <div class="check-item" data-pid="${p.id}">
        <input type="checkbox" ${p.checked?'checked':''} data-pid="${p.id}">
        <label class="check-item-label">${esc(p.label)}</label>
        <button class="check-item-del" data-pid="${p.id}" aria-label="삭제">×</button>
      </div>`).join('');
    return `
      <div class="fg" id="fg-packing">
        <label class="fl">준비물</label>
        <div class="check-items" id="list-packing">${html}</div>
        <div class="add-row">
          <input class="add-input" id="add-packing" type="text" placeholder="준비물 추가…" />
          <button class="add-btn" id="addbtn-packing" disabled>+</button>
        </div>
      </div>`;
  }

  function bindEditListSections(ev) {
    ['accommodation','destinations','meals'].forEach(key=>{
      const addInput = document.getElementById(`add-${key}`);
      const addBtn   = document.getElementById(`addbtn-${key}`);
      const list     = document.getElementById(`list-${key}`);

      addInput.addEventListener('input',()=>{ addBtn.disabled=!addInput.value.trim(); });

      addBtn.addEventListener('click',()=>{
        const val=addInput.value.trim(); if(!val) return;
        if(!DB[ev.id][key]) DB[ev.id][key]=[];
        DB[ev.id][key].push(val); save(DB);
        const item=document.createElement('div');
        item.className='list-item'; item.dataset.key=key;
        item.innerHTML=`<span class="list-item-text">${esc(val)}</span>
          <button class="list-item-del" data-key="${key}" data-val="${esc(val)}" aria-label="삭제">×</button>`;
        item.querySelector('button').addEventListener('click',e=>delListItem(e,ev,key));
        list.appendChild(item); addInput.value=''; addBtn.disabled=true;
      });

      list.querySelectorAll('.list-item-del').forEach(b=>b.addEventListener('click',e=>delListItem(e,ev,key)));
    });
  }

  function delListItem(e, ev, key) {
    const val=e.currentTarget.dataset.val;          // dataset은 이미 디코딩된 원본 값
    const arr=DB[ev.id][key]||[];
    const i=arr.indexOf(val);                        // 원본끼리 비교 + 첫 일치 1개만 제거
    if(i>-1) arr.splice(i,1);
    save(DB);
    e.currentTarget.closest('.list-item').remove();
  }

  function bindEditCheckSection(ev) {
    const addInput = document.getElementById('add-packing');
    const addBtn   = document.getElementById('addbtn-packing');
    const list     = document.getElementById('list-packing');

    addInput.addEventListener('input',()=>{ addBtn.disabled=!addInput.value.trim(); });

    addBtn.addEventListener('click',()=>{
      const label=addInput.value.trim(); if(!label) return;
      const p={id:uid(), label, checked:false};
      if(!DB[ev.id].packing) DB[ev.id].packing=[];
      DB[ev.id].packing.push(p); save(DB);
      const item=document.createElement('div');
      item.className='check-item'; item.dataset.pid=p.id;
      item.innerHTML=`<input type="checkbox" data-pid="${p.id}">
        <label class="check-item-label">${esc(p.label)}</label>
        <button class="check-item-del" data-pid="${p.id}" aria-label="삭제">×</button>`;
      item.querySelector('input').addEventListener('change',e=>togglePacking(e,ev));
      item.querySelector('button').addEventListener('click',e=>delPacking(e,ev));
      list.appendChild(item); addInput.value=''; addBtn.disabled=true;
    });

    list.querySelectorAll('input[type="checkbox"]').forEach(cb=>cb.addEventListener('change',e=>togglePacking(e,ev)));
    list.querySelectorAll('.check-item-del').forEach(b=>b.addEventListener('click',e=>delPacking(e,ev)));
  }

  function togglePacking(e,ev) {
    const pid=e.currentTarget.dataset.pid;
    const p=DB[ev.id].packing.find(x=>x.id===pid);
    if(p) { p.checked=e.currentTarget.checked; save(DB); }
  }

  function delPacking(e,ev) {
    const pid=e.currentTarget.dataset.pid;
    DB[ev.id].packing=DB[ev.id].packing.filter(p=>p.id!==pid);
    save(DB); e.currentTarget.closest('.check-item').remove();
  }

  function renderEditFoot(ev) {
    sheetFoot.innerHTML='';
    const cancel=btn('취소','btn btn-s'); cancel.onclick=()=>{ closeSheet(); openView(ev.id); };
    const save_=btn('저장','btn btn-p'); save_.onclick=()=>saveEdit(ev);
    const btns=[cancel,save_];
    if(ev.type==='travel') {
      const detail=btn('상세 →','btn btn-t'); detail.onclick=()=>{ closeSheet(); openDetail(ev.id); };
      btns.push(detail);
    }
    sheetFoot.append(...btns);
  }

  function saveEdit(ev) {
    if(ev.type==='single') {
      const start=document.getElementById('ed-start').value;
      const content=document.getElementById('ed-content').value.trim();
      if(!start) return;
      DB[ev.id].startDate=start; DB[ev.id].endDate=start; DB[ev.id].content=content;
    } else {
      const start=document.getElementById('ed-start').value;
      const end=document.getElementById('ed-end').value;
      const title=document.getElementById('ed-title').value.trim();
      if(!start||!end||end<start) { alert('날짜를 확인해 주세요.'); return; }
      DB[ev.id].startDate=start; DB[ev.id].endDate=end; DB[ev.id].title=title;
    }
    DB[ev.id].category = selectedCat(sheetBody);
    save(DB); renderCalendar(); closeSheet(); openView(ev.id);
  }

  /* ─── Delete ─── */
  function deleteEvent(id) {
    if(!confirm('일정을 삭제할까요?')) return;
    delete DB[id]; save(DB); renderCalendar(); closeSheet();
  }

  /* ─── Detail page ─── */
  function openDetail(id) {
    const ev=DB[id]; if(!ev) return;
    activeId=id;
    detailTitle.textContent = ev.title||fmtDate(ev.startDate);
    renderDetailBody(ev);
    vCal.classList.add('behind');
    vDetail.classList.add('active');
  }

  function closeDetail() {
    vDetail.classList.remove('active');
    vCal.classList.remove('behind');
    activeId=null;
  }

  function renderDetailBody(ev) {
    if(ev.type==='single') {
      detailBody.innerHTML=`
        <div class="detail-hero" style="border-bottom-color:${catColor(ev)}">
          <div class="detail-hero-eyebrow" style="color:${catColor(ev)}">${catOf(ev)?catOf(ev).name:'단일 일정'}</div>
          <h2>${fmtDate(ev.startDate)}</h2>
        </div>
        <div class="detail-single-content">${esc(ev.content)||'<em style="color:var(--ink-mute)">내용 없음</em>'}</div>
      `;
    } else {
      const nights=nightsBetween(ev.startDate,ev.endDate);
      detailBody.innerHTML=`
        <div class="detail-hero" style="border-bottom-color:${catColor(ev)}">
          <div class="detail-hero-eyebrow" style="color:${catColor(ev)}">${catOf(ev)?catOf(ev).name:'여행'}</div>
          <h2>${esc(ev.title||'여행 일정')}</h2>
          <div class="detail-hero-meta">
            <span>${fmtDate(ev.startDate)}</span>
            <span>→</span>
            <span>${fmtDate(ev.endDate)}</span>
            <span>${nights}박 ${nights+1}일</span>
          </div>
        </div>
        ${detailSection('숙소',ev.accommodation)}
        ${detailSection('여행지',ev.destinations)}
        ${detailSection('식사',ev.meals)}
        ${detailCheckSection('준비물',ev.packing,ev.id)}
      `;
      // bind packing in detail
      detailBody.querySelectorAll('.detail-packing-cb').forEach(cb=>{
        cb.addEventListener('change',()=>{
          const p=DB[ev.id].packing.find(x=>x.id===cb.dataset.pid);
          if(p) { p.checked=cb.checked; save(DB); }
        });
      });
    }
  }

  function detailSection(label,items) {
    if(!items||!items.length) return `
      <div class="detail-section">
        <div class="detail-section-label">${label}</div>
        <div style="color:var(--ink-mute);font-size:13px;font-style:italic">미입력</div>
      </div>`;
    return `
      <div class="detail-section">
        <div class="detail-section-label">${label}</div>
        <div class="detail-items">${items.map(t=>`<div class="detail-item">${esc(t)}</div>`).join('')}</div>
      </div>`;
  }

  function detailCheckSection(label,items,evId) {
    if(!items||!items.length) return `
      <div class="detail-section">
        <div class="detail-section-label">${label}</div>
        <div style="color:var(--ink-mute);font-size:13px;font-style:italic">미입력</div>
      </div>`;
    return `
      <div class="detail-section">
        <div class="detail-section-label">${label}</div>
        ${items.map(p=>`
          <div class="detail-check-item">
            <input type="checkbox" class="detail-packing-cb" data-pid="${p.id}" ${p.checked?'checked':''}>
            <label class="detail-check-label">${esc(p.label)}</label>
          </div>`).join('')}
      </div>`;
  }

  /* ─── Misc ─── */
  function esc(s) {
    if(!s) return '';
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
  function btn(text,cls) {
    const b=document.createElement('button');
    b.className=cls; b.textContent=text; return b;
  }

  /* ─── Event bindings ─── */
  document.getElementById('btn-prev').onclick=()=>{ if(--cm<0){cm=11;cy--;} renderCalendar(); };
  document.getElementById('btn-next').onclick=()=>{ if(++cm>11){cm=0;cy++;} renderCalendar(); };
  document.getElementById('btn-add').onclick=()=>openCreate(null);
  document.getElementById('btn-cats').onclick=openCats;
  overlay.onclick=closeSheet;
  btnSheetClose.onclick=closeSheet;
  btnSheetEdit.onclick=()=>{ const ev=DB[activeId]; if(ev){ closeSheet(); openEdit(ev.id); } };
  document.getElementById('btn-back').onclick=closeDetail;
  document.getElementById('btn-detail-edit').onclick=()=>{ const id=activeId; closeDetail(); openEdit(id); };

  /* ─── Init ─── */
  renderCalendar();

})();
</script>

<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => { navigator.serviceWorker.register('./sw.js'); });
  }
</script>
</body>
</html>
